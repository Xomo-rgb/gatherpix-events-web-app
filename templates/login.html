{% extends "base.html" %}
{% block title %}Log in — GatherPix{% endblock %}

{% block extra_head %}
<style>
  .auth-wrap {
    min-height: calc(100vh - 56px);
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 1rem;
  }
  .auth-box {
    width: 100%; max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2.5rem 2rem;
  }
  .auth-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem; font-weight: 400;
    color: var(--ink);
    margin-bottom: 0.35rem;
  }
  .auth-sub {
    font-size: 0.9rem;
    color: var(--ink2);
    margin-bottom: 2rem;
  }
  .field { margin-bottom: 1.1rem; }
  .field label {
    display: block;
    font-size: 0.82rem; font-weight: 500;
    color: var(--ink);
    margin-bottom: 0.4rem;
  }
  .field input {
    width: 100%;
    padding: 0.7rem 0.9rem;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    font-family: 'Inter', sans-serif;
    font-size: 0.92rem;
    background: var(--bg);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--accent); background: #fff; }
  .field input::placeholder { color: #a89080; }
  .btn-submit {
    width: 100%; margin-top: 0.5rem;
    padding: 0.8rem;
    background: var(--ink); color: #fff;
    border: none; border-radius: 7px;
    font-size: 0.92rem; font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-submit:hover { background: var(--ink2); }
  .auth-foot {
    text-align: center;
    font-size: 0.85rem;
    color: var(--ink2);
    margin-top: 1.5rem;
  }
  .auth-foot a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .auth-foot a:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <h1 class="auth-title">Welcome back.</h1>
    <p class="auth-sub">Log in to manage your events and galleries.</p>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn-submit" onclick="doLogin()">Log in</button>
    <p class="auth-foot">No account? <a href="/register">Create one</a></p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function doLogin() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  if (!email || !password) { toast("Please fill in all fields", "error"); return; }
  const res = await fetch("/api/login", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  if (res.ok) { location.href = "/dashboard"; }
  else { toast(data.error || "Login failed", "error"); }
}
document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
</script>
{% endblock %}
