{% extends "base.html" %}
{% block title %}Create account — GatherPix{% endblock %}

{% block extra_head %}
<style>
  .auth-wrap {
    min-height: calc(100vh - 60px);
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 1rem;
  }
  .auth-box {
    width: 100%; max-width: 420px;
    padding: 2.5rem;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r);
    box-shadow: var(--shadow);
  }
  .auth-title { font-size: 2rem; font-weight: 300; margin-bottom: 0.4rem; }
  .auth-sub { font-size: 0.875rem; color: var(--muted); margin-bottom: 2rem; }
  .auth-footer { text-align: center; font-size: 0.82rem; color: var(--muted); margin-top: 1.5rem; }
  .auth-footer a { color: var(--rose); text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <h1 class="auth-title serif">Create account</h1>
    <p class="auth-sub">Start sharing your event photos and videos today</p>

    <div class="form-group">
      <label>Your name</label>
      <input type="text" id="name" placeholder="Jane Smith" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" />
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem" onclick="doRegister()">
      Create account
    </button>
    <p class="auth-footer">Already have an account? <a href="/login">Log in</a></p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function doRegister() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  if (!name || !email || !password) { toast("Please fill in all fields", "error"); return; }
  if (password.length < 8) { toast("Password must be at least 8 characters", "error"); return; }
  const res = await fetch("/api/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, email, password })
  });
  const data = await res.json();
  if (res.ok) { location.href = "/dashboard"; }
  else { toast(data.error || "Registration failed", "error"); }
}
document.addEventListener("keydown", e => { if (e.key === "Enter") doRegister(); });
</script>
{% endblock %}
