<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}GatherPix{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5f0eb;
      --surface:  #ffffff;
      --ink:      #1a1410;
      --ink2:     #3d3028;
      --sub:      #6b5c52;
      --border:   #ddd5cc;
      --accent:   #8b5e3c;
      --accent2:  #6b4a2e;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(245,240,235,0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px;
    }
    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; font-weight: 500;
      color: var(--ink); text-decoration: none;
      letter-spacing: 0.01em;
    }
    .nav-brand-mark { color: var(--accent); margin-right: 0.3rem; }
    .nav-links { display: flex; gap: 0.4rem; align-items: center; }
    .nav-link {
      font-size: 0.85rem; color: var(--ink2);
      text-decoration: none; padding: 0.4rem 0.75rem;
      border-radius: 6px; transition: background 0.15s;
      font-weight: 400;
    }
    .nav-link:hover { background: var(--border); color: var(--ink); }
    .nav-cta {
      font-size: 0.85rem; font-weight: 500;
      font-family: 'Inter', sans-serif;
      padding: 0.45rem 1rem;
      border-radius: 6px; cursor: pointer;
      text-decoration: none; border: none;
      background: var(--ink); color: #fff;
      transition: background 0.15s;
    }
    .nav-cta:hover { background: var(--ink2); }
    @media (max-width: 500px) { nav { padding: 0 1rem; } }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(10px);
      z-index: 9999;
      padding: 0.65rem 1.25rem;
      border-radius: 8px;
      font-size: 0.85rem; font-weight: 500;
      background: var(--ink); color: #fff;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { background: #2d6a4f; }
    #toast.error   { background: #7c2020; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav>
    <a class="nav-brand" href="/"><span class="nav-brand-mark">✦</span>GatherPix</a>
    <div class="nav-links" id="nav-links">
      <a href="/login" class="nav-link">Log in</a>
      <a href="/register" class="nav-cta">Create event</a>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <div id="toast"></div>

  <script>
    function toast(msg, type = "success") {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = "show " + type;
      setTimeout(() => t.className = "", 3200);
    }
    async function checkAuth() {
      const data = await fetch("/api/me").then(r => r.json());
      const nav = document.getElementById("nav-links");
      if (data.authenticated) {
        nav.innerHTML = `
          <a href="/dashboard" class="nav-link">Dashboard</a>
          <button class="nav-cta" style="cursor:pointer;border:none" onclick="logout()">Log out</button>`;
      }
    }
    async function logout() {
      await fetch("/api/logout", { method: "POST" });
      location.href = "/";
    }
    checkAuth();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
